name: Back up Repositories

on:
  schedule:
    - cron: "0 0 * * *" # Runs at midnight every day of every month
  workflow_dispatch:

permissions:
  contents: read

jobs:
  back-up:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        repo:
          - izg-configuration-console
          - izg-transformation-ui
          - izgw-hub
          - izgw-core
          - izgw-transform
          - v2tofhir
          - izgw-bom
          - alpine-node-openssl-fips
          - ads-file-submission-app
          - iz-gateway-terraform
          - operations
          - izgw-aws-lambda
          - izgw-performance-test
          - jmeter-setup-action

    steps:
      - name: Debug repo name
        run: echo "Cloning IZGateway/${{ matrix.repo }} with all branches and tags"

      - name: Clone repository
        env:
          PAT: ${{ secrets.BACKUP_TOKEN }}
          REPO: ${{ matrix.repo }}
        run: |
          git clone --bare https://$PAT@github.com/IZGateway/${{ matrix.repo }}.git $REPO.git
          cd $REPO.git
          git fetch --all --tags
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{vars.AWS_REGION}}
                    
      - name: Back up ${{ matrix.repo }}
        env:
            BACKUP_DIR: ${{ github.workspace }}/backups
            REPO: ${{ matrix.repo }}
        run: |
            mkdir -p "$BACKUP_DIR"
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
            BACKUP_FILE="${BACKUP_DIR}/${REPO}_backup_${TIMESTAMP}.tar.gz"
            tar -czf $BACKUP_FILE ${REPO}.git
            aws s3 cp $BACKUP_FILE s3://izgateway-github-backup/$REPO/